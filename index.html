<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<title>✿ Cookie Crumbler ✿</title>

<!-- Open Graph / Discord / Slack / WhatsApp preview -->
<meta property="og:type"        content="website" />
<meta property="og:url"         content="https://cookiecrumbler.lol/" />
<meta property="og:title"       content="✿ Cookie Crumbler ✿" />
<meta property="og:description" content="Click as fast as you can to break the giant chocolate chip cookie! How many clicks will it take?" />
<meta property="og:image"       content="https://cookiecrumbler.lol/preview.png" />
<meta name="twitter:card"        content="summary_large_image" />
<meta name="twitter:title"       content="✿ Cookie Crumbler ✿" />
<meta name="twitter:description" content="Click as fast as you can to break the giant chocolate chip cookie! How many clicks will it take?" />
<meta name="twitter:image"       content="https://cookiecrumbler.lol/preview.png" />

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="title">✿ COOKIE CRUMBLER ✿</div>
<p class="subtitle">~ click faster = more damage! ~</p>

<div class="stats">
  <div class="stat-cell"><span class="stat-lbl">🍪 CLICKS</span><span class="stat-val" id="sClicks">0000</span></div>
  <div class="stat-cell"><span class="stat-lbl">⏱ TIME</span><span class="stat-val" id="sTime">00:00</span></div>
  <div class="stat-cell"><span class="stat-lbl">⚡ CPS</span><span class="stat-val" id="sCps">0.0</span></div>
  <div class="stat-cell"><span class="stat-lbl">💥 DAMAGE</span><span class="stat-val" id="sDmg">×1</span></div>
</div>

<div class="cookie-wrap" id="wrap"><canvas id="c"></canvas></div>

<div class="hp-wrap">
  <div class="hp-head"><span>♥ HP</span><span id="hpPct">100%</span></div>
  <div class="hp-track"><div class="hp-fill" id="hpFill"></div></div>
</div>

<div class="tip" id="tip">click the cookie!</div>

<button class="btn-restart is-hidden" id="btnRestart">↺ RESTART</button>

<div class="records">
  <div class="rec-title">★ HIGH SCORES ★</div>
  <div class="lb-header">
    <span>#</span><span>NAME</span><span>CLICKS</span><span>TIME</span>
  </div>
  <div id="leaderboard"><div class="lb-loading">loading...</div></div>
  <div class="lb-nav-row">
    <button class="lb-nav" id="lbPrev" disabled>◀ PREV</button>
    <span class="lb-page-info" id="lbPageInfo">1 / 1</span>
    <button class="lb-nav" id="lbNext"  disabled>NEXT ▶</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="res-title">🍪 CRUMBLED! 🍪</div>
    <div class="res-stats">
      <div class="res-row">CLICKS <span id="rClicks">0000</span></div>
      <div class="res-row">TIME   <span id="rTime">0.00s</span></div>
    </div>
    <div class="new-rec is-hidden" id="newRecMsg">★ NEW RECORD! ★</div>
    <div class="name-section">
      <span class="name-lbl">ENTER YOUR NAME:</span>
      <input type="text" id="nameInput" class="name-input" maxlength="8" placeholder="PLAYER" autocomplete="off" />
      <div class="name-error" id="nameError">⚠ name not allowed!</div>
    </div>
    <div class="res-btns">
      <button class="btn-submit" id="btnSubmit">SUBMIT</button>
      <button class="btn-skip">SKIP</button>
    </div>
  </div>
</div>

<script src="/app.js" defer></script>
</body>
</html>
